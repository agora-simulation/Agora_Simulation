<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">

  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Agora — virtuelle Gesellschaften für Marktforschung. DSGVO-nativ, europäisch.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <script>
    // Prevent flash of wrong theme before Angular bootstraps
    (function() {
      var t = localStorage.getItem('theme');
      var d = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme:dark)').matches;
      document.documentElement.classList.add(d ? 'dark' : 'light');
    })();
  </script>
  <app-root></app-root>
</body>
</html>
